name: 全版

on:
  workflow_dispatch:

env:
  SCRIPT_REPO: ${{ github.repository }}
  SCRIPT_REF: ${{ github.ref_name }}
  UBOOT_REPO: hzyitc/u-boot-onecloud
  UBOOT_RELEASE: latest
  UBOOT_BURNIMG: eMMC.burn.img
  ARMBIAN_REPO: armbian/build
  ARMBIAN_REF: v26.2.1

permissions:
  contents: write

jobs:
  prepare:
    name: 准备
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.get.outputs.env }}

    steps:
      - id: get
        name: Get repositories and Armbian information
        run: |
          sudo timedatectl set-timezone "Asia/Shanghai"
          TIME="$(curl https://api.github.com/repos/${SCRIPT_REPO}/actions/runs/${GITHUB_RUN_ID} | jq -r .created_at)"
          TAG="ci-$(date -d "$TIME" -u +'%Y%m%d-%H%M%S-%Z')"

          SCRIPT_SHA=$(curl https://api.github.com/repos/${SCRIPT_REPO}/commits/${SCRIPT_REF} | jq -r .sha)
          UBOOT_TAG=$(curl https://api.github.com/repos/${UBOOT_REPO}/releases/${UBOOT_RELEASE} | jq -r .tag_name)
          ARMBIAN_SHA=$(curl https://api.github.com/repos/${ARMBIAN_REPO}/commits/${ARMBIAN_REF} | jq -r .sha)

          echo "Cloning Armbian repository..."
          git clone https://github.com/armbian/os os

          ARMBIAN_VERSION=$(cat os/stable.json | jq '.version' | sed "s/\"//g")

          cat <<EOF | sed -E 's/^  //' >>$GITHUB_ENV
            TIME=$TIME
            TAG=$TAG
            SCRIPT_SHA=$SCRIPT_SHA
            UBOOT_TAG=$UBOOT_TAG
            ARMBIAN_SHA=$ARMBIAN_SHA
            ARMBIAN_VERSION=$ARMBIAN_VERSION
          EOF

          echo "env=$(cat $GITHUB_ENV | base64 -w 0)" >>$GITHUB_OUTPUT

      - name: 显示存储库信息
        run: |
          C_RESET="\e[0m"
          C_BLACK="\e[30m"
          C_RED="\e[31m"
          C_GREEN="\e[32m"
          C_YELLOW="\e[33m"
          C_BLUE="\e[34m"
          C_MAGENTA="\e[35m"
          C_CYAN="\e[36m"
          C_GRAY="\e[37m"

          echo -e "$(cat <<EOF | sed -E 's/^  //'
            TIME: ${C_GREEN}$(date -d "$TIME" +'%Y-%m-%d %H:%M:%S %Z(%:z)')${C_RESET}
            Script: ${C_BLUE}${SCRIPT_REPO}${C_RESET}@${C_MAGENTA}${SCRIPT_REF}${C_RESET}(https://github.com/${SCRIPT_REPO}/tree/${SCRIPT_REF})
                    ${C_YELLOW}${SCRIPT_SHA}${C_RESET}(https://github.com/${SCRIPT_REPO}/tree/${SCRIPT_SHA})
            U-Boot: ${C_BLUE}${UBOOT_REPO}${C_RESET}@${C_MAGENTA}${UBOOT_RELEASE}${C_RESET}(https://github.com/${UBOOT_REPO}/releases/tag/${UBOOT_RELEASE})
                    ${C_MAGENTA}${UBOOT_TAG}${C_RESET}(https://github.com/${UBOOT_REPO}/releases/tag/${UBOOT_TAG})
            Armbian: ${C_BLUE}${ARMBIAN_REPO}${C_RESET}@${C_MAGENTA}${ARMBIAN_REF}${C_RESET}(https://github.com/${ARMBIAN_REPO}/tree/${ARMBIAN_REF})
                     ${C_YELLOW}${ARMBIAN_SHA}${C_RESET}(https://github.com/${ARMBIAN_REPO}/tree/${ARMBIAN_SHA})
          EOF
          )"

          cat <<EOF | sed -E 's/^  //' >>$GITHUB_STEP_SUMMARY
            # $(date -d "$TIME" +'%Y-%m-%d %H:%M:%S %Z(%:z)')

            ## Sources
            Script: [${SCRIPT_REPO}@${SCRIPT_REF}](https://github.com/${SCRIPT_REPO}/tree/${SCRIPT_REF}) ([\`${SCRIPT_SHA}\`](https://github.com/${SCRIPT_REPO}/tree/${SCRIPT_SHA}))
            U-Boot: [${UBOOT_REPO}@${UBOOT_RELEASE}](https://github.com/${UBOOT_REPO}/releases/tag/${UBOOT_RELEASE}) ([\`${UBOOT_TAG}\`](https://github.com/${UBOOT_REPO}/releases/tag/${UBOOT_TAG}))
            Armbian: [${ARMBIAN_REPO}@${ARMBIAN_REF}](https://github.com/${ARMBIAN_REPO}/tree/${ARMBIAN_REF}) ([\`${ARMBIAN_SHA}\`](https://github.com/${ARMBIAN_REPO}/tree/${ARMBIAN_SHA}))

          EOF

      - name: 生成发布信息
        run: |
          cat <<EOF | sed -E 's/^  //' | tee Release.md
            全版 $(date -d "$TIME" +'%Y-%m-%d %H:%M:%S %Z(%:z)')

            # Sources
            Script: [${SCRIPT_REPO}@${SCRIPT_REF}](https://github.com/${SCRIPT_REPO}/tree/${SCRIPT_REF}) ([\`${SCRIPT_SHA}\`](https://github.com/${SCRIPT_REPO}/tree/${SCRIPT_SHA}))
            U-Boot: [${UBOOT_REPO}@${UBOOT_RELEASE}](https://github.com/${UBOOT_REPO}/releases/tag/${UBOOT_RELEASE}) ([\`${UBOOT_TAG}\`](https://github.com/${UBOOT_REPO}/releases/tag/${UBOOT_TAG}))
            Armbian: [${ARMBIAN_REPO}@${ARMBIAN_REF}](https://github.com/${ARMBIAN_REPO}/tree/${ARMBIAN_REF}) ([\`${ARMBIAN_SHA}\`](https://github.com/${ARMBIAN_REPO}/tree/${ARMBIAN_SHA}))

            # SHA256
          EOF

          echo "NAME=$(head --line=1 Release.md)" >>$GITHUB_ENV
          tail --line=+2 Release.md > Body.md

      - name: 建立版本信息
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.NAME }}
          body_path: Body.md

  build-kernel:
    name: 编译Current分支
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: 引入环境参数
        run: |
          echo "$(echo "${{ needs.prepare.outputs.env }}" | base64 -d)" >>$GITHUB_ENV

      - name: 检查
        uses: actions/checkout@main
        with:
          repository: ${{ env.ARMBIAN_REPO }}
          ref: ${{ env.ARMBIAN_SHA }}

      - name: 缓存 Armbian 构建
        id: cache
        uses: actions/cache@v4
        with:
          path: output/
          key: armbian-kernel-${{ env.ARMBIAN_SHA }}-${{ env.ARMBIAN_VERSION }}
          restore-keys: |
            armbian-kernel-${{ env.ARMBIAN_SHA }}-

      - name: 编译
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo --preserve-env \
            ./compile.sh kernel \
              REVISION="${{ env.ARMBIAN_VERSION }}" \
              ALLOW_ROOT=yes \
              BOARD=onecloud \
              BRANCH=current \
              EXPERT=yes
          sudo chown $(id -u):$(id -g) -R output/
        
      - name: 内核哈希信息
        run: |
          for f in output/debs/*.deb; do
            sha256sum "$f" | tee -a sha256sum
          done

      - name: 上传资料
        uses: actions/upload-artifact@main
        with:
          name: kernel-current
          path: output/debs/*
      
      - name: 生成发布信息
        run: |
          cat <<EOF | sed -E 's/^  //' | tee Release.md
            $(cat sha256sum | awk '{printf "%s: `%s`\n", $2, $1}')
          EOF

      - name: 上传至发布平台
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          append_body: true
          body_path: Release.md
          files: |
            output/debs/*

  build:
    name: 编译 bookworm-current-minimal
    needs: [ prepare, build-kernel ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        RELEASE:
          - bookworm # Debian 12
        TYPE:
          - minimal

    steps:
      - name: 引入环境参数
        run: |
          echo "$(echo "${{ needs.prepare.outputs.env }}" | base64 -d)" >>$GITHUB_ENV

      - name: 检查服务器信息
        run: |
          echo "-------------------------------CPU信息-------------------------------------------"
          echo
          echo "CPU物理数量:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
          echo "CPU核心及版本信息:$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c)"
          echo
          echo "-------------------------------内存信息-------------------------------------------"
          echo
          echo "已安装内存详细信息："
          sudo lshw -short -C memory | grep GiB
          echo
          echo "-------------------------------硬盘信息--------------------------------------------"
          echo
          echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)"
          echo "硬盘详情："
          df -Th
        
      - name: 缓存 APT 包
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-armbian-${{ env.ARMBIAN_SHA }}
          restore-keys: |
            apt-${{ runner.os }}-

      - name: 初始化环境
        run: |
          sudo timedatectl set-timezone "Asia/Shanghai"
          sudo apt update -y
          sudo apt install android-sdk-libsparse-utils
          df -Th

      - name: 检查信息
        uses: actions/checkout@main
        with:
          repository: ${{ env.ARMBIAN_REPO }}
          ref: ${{ env.ARMBIAN_SHA }}

      - name: 下载内核
        uses: actions/download-artifact@main
        with:
          name: kernel-current
          path: output/debs/

      - name: 编译
        run: |
          sudo --preserve-env \
            ./compile.sh build \
              REVISION="${{ env.ARMBIAN_VERSION }}" \
              ALLOW_ROOT=yes \
              BOARD=onecloud \
              BRANCH=current \
              RELEASE=bookworm \
              KERNEL_CONFIGURE=no \
              BUILD_MINIMAL=no \
              BUILD_DESKTOP=no \
              EXPERT=yes \
              COMPRESS_OUTPUTIMAGE=img
          sudo chown $(id -u):$(id -g) -R output/

      - name: 安装 NetBird
        run: |
          # 挂载镜像
          diskimg=$(ls output/images/*.img)
          loop=$(sudo losetup --find --show --partscan $diskimg)
          sudo mount ${loop}p2 /mnt

          # 用官方脚本安装 NetBird
          sudo chroot /mnt /bin/bash -c "
            # 配置 DNS（chroot 里没有 resolv.conf）
            mkdir -p /etc
            echo 'nameserver 8.8.8.8' > /etc/resolv.conf
            echo 'nameserver 223.5.5.5' >> /etc/resolv.conf

            curl -fsSL https://pkgs.netbird.io/install.sh | sh

            # 验证安装
            echo '=== 验证 NetBird 安装 ==='
            which netbird || { echo 'ERROR: netbird command not found'; exit 1; }
            netbird version || { echo 'ERROR: netbird version failed'; exit 1; }
            ls -la /usr/bin/netbird || { echo 'ERROR: netbird binary not found'; exit 1; }

            # 创建 systemd service
            printf '[Unit]\nDescription=NetBird Agent\nAfter=network-online.target\nWants=network-online.target\n\n[Service]\nExecStart=/usr/bin/netbird service run\nRestart=always\nRestartSec=5\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/netbird.service
            systemctl enable netbird || echo 'WARN: systemctl enable failed (expected in chroot)'

            # 创建配置文件（占位符，部署时替换）
            mkdir -p /etc/netbird
            printf '{\"ManagementUrl\":\"https://netbird.rangel.fun\",\"SetupKey\":\"B88257F7-7F9C-4AC7-9BBC-38B1C8CD2409\"}' > /etc/netbird/config.json

            # IP 转发
            echo 'net.ipv4.ip_forward=1' > /etc/sysctl.d/99-netbird.conf
            echo 'net.ipv6.conf.all.forwarding=1' >> /etc/sysctl.d/99-netbird.conf

            # === SSH 配置 ===
            sed -i 's/#\?PermitRootLogin .*/PermitRootLogin yes/' /etc/ssh/sshd_config

            echo '=== NetBird 安装完成 ==='
          " || { echo 'ERROR: NetBird installation failed'; sudo umount /mnt; sudo losetup -d $loop; exit 1; }

          # 卸载
          sudo umount /mnt
          sudo losetup -d $loop

      - name: 安装AmlImg
        run: |
          sudo apt install android-sdk-libsparse-utils
          
          ver="v0.3.2"
          curl -L -o ./AmlImg https://github.com/rmoyulong/AmlImg/releases/download/$ver/AmlImg_${ver}_linux_amd64
          chmod +x ./AmlImg   

      - name: 下载解压最新u-boot
        run: |
          echo "::group::Download"
          curl -L -o ./uboot.img https://github.com/rmoyulong/u-boot-onecloud/releases/download/Onecloud_Uboot_23.12.24_18.15.09/eMMC.burn.img
          echo "::endgroup::"

          echo "::group::Unpack"
          ./AmlImg unpack ./uboot.img burn/
          echo "::endgroup::"

      - name: 提取引导分区和根文件系统分区
        run: |
          diskimg=$(ls output/images/*.img)
          loop=$(sudo losetup --find --show --partscan $diskimg)
          sudo img2simg ${loop}p1 burn/boot.simg
          sudo img2simg ${loop}p2 burn/rootfs.simg
          sudo losetup -d $loop
          sudo chown $(id -u):$(id -g) -R burn/

      - name: 生成烧录镜像
        run: |
          echo -n "sha1sum $(sha1sum burn/boot.simg | awk '{print $1}')" >burn/boot.VERIFY
          echo -n "sha1sum $(sha1sum burn/rootfs.simg | awk '{print $1}')" >burn/rootfs.VERIFY

          cat <<EOF >>burn/commands.txt
          PARTITION:boot:sparse:boot.simg
          VERIFY:boot:normal:boot.VERIFY
          PARTITION:rootfs:sparse:rootfs.simg
          VERIFY:rootfs:normal:rootfs.VERIFY
          EOF

          prefix=$(ls output/images/*.img | sed 's/\.img$//')
          burnimg=${prefix}.burn.img
          ./AmlImg pack $burnimg burn/

      - name: 镜像哈希信息和压缩
        run: |
          for f in output/images/*.img; do
            sha256sum "$f" | tee -a sha256sum
            xz --threads=0 --compress "$f"
          done

      - name: 上传资料
        uses: actions/upload-artifact@main
        with:
          name: bookworm-current-minimal
          path: output/images/*

      - name: 生成发布信息
        run: |
          cat <<EOF | sed -E 's/^  //' | tee Release.md
            $(cat sha256sum | awk '{printf "%s: `%s`\n", $2, $1}')
          EOF

      - name: 上传至发布平台
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          append_body: true
          body_path: Release.md
          files: |
            output/images/*
